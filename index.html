<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xhuna</title>
  <meta name="description" content="Xhuna, tu planeador de comidas." />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f5;
      color: #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 640px;
      background: white;
      padding: 40px 28px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 42px;
      margin-bottom: 12px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 14px 22px;
      background: #111111;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
    }
    .small {
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Xhuna</h1>
    <p>Tu planeador de comidas para organizar tu semana de forma simple, práctica y sin estrés.</p>
    <a class="btn" href="mailto:hola@xhunaapp.com">Contáctanos</a>
    <div class="small">Próximamente en Google Play</div>
  </div>
</body>
</html>
